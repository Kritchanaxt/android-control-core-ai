<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Relay Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; background-color: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .col { flex: 1; margin-bottom: 0; } /* Reset margin for cards inside row */
        
        @media (max-width: 768px) {
            .row { flex-direction: column; }
            .col { margin-bottom: 20px; }
        }

        h2 { margin-top: 0; color: #333; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #007AFF; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-right: 5px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button.red { background-color: #FF3B30; }
        button.green { background-color: #34C759; }
        #log { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; height: 300px; overflow-y: auto; font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; border: 1px solid #333; line-height: 1.4; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .log-time { color: #888; margin-right: 8px; font-size: 11px; }
        .log-type-info { color: #4ec9b0; }
        .log-type-success { color: #b5cea8; }
        .log-type-warning { color: #ce9178; }
        .log-type-error { color: #f44747; }
        .log-type-tx { color: #569cd6; } /* Transmit */
        .log-type-rx { color: #dcdcaa; } /* Receive */
        .status { padding: 5px 10px; border-radius: 4px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .status.connected { background-color: #d4edda; color: #155724; }
        .status.disconnected { background-color: #f8d7da; color: #721c24; }

        /* Monitor Styles */
        .monitor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .monitor-item { background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #eee; text-align: center; }
        .monitor-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .monitor-value { font-size: 18px; font-weight: bold; color: #007AFF; font-family: 'Consolas', monospace; }
        .monitor-high { color: #FF3B30; }
        .monitor-med { color: #FF9500; }
    </style>
</head>
<body>

    <div class="row">
        <div class="card col" style="flex: 2;">
            <h2>📊 Android Resource Monitor</h2>
            <div id="statusBadge" class="status disconnected">Disconnected</div>
            
            <div class="monitor-grid">
                <div class="monitor-item">
                    <span class="monitor-label">CPU Usage</span>
                    <span id="cpuVal" class="monitor-value">--%</span>
                </div>
                <div class="monitor-item">
                    <span class="monitor-label">RAM Used</span>
                    <span id="ramUsedVal" class="monitor-value">-- MB</span>
                </div>
                <div class="monitor-item">
                    <span class="monitor-label">RAM Total</span>
                    <span id="ramTotalVal" class="monitor-value">-- MB</span>
                </div>
                <div class="monitor-item">
                    <span class="monitor-label">Battery / Temp</span>
                    <span id="batteryVal" class="monitor-value">--% / --°C</span>
                </div>
                <div class="monitor-item" style="background: #eef2ff; border-color: #d1d9ff;">
                    <span class="monitor-label">Current OCR Mode</span>
                    <span id="ocrModeVal" class="monitor-value" style="font-size: 14px; color: #5856D6;">OFF</span>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label for="urlInput">WebSocket URL:</label>
                <input type="text" id="urlInput" value="ws://192.168.1.X:8887" placeholder="ws://YOUR_ANDROID_IP:8887">
                
                <label for="passkeyInput">Passkey:</label>
                <input type="text" id="passkeyInput" placeholder="Enter 6-digit passkey">
                
                <div style="margin-top: 10px;">
                    <button id="connectBtn" onclick="connect()" class="green">Connect</button>
                    <button id="disconnectBtn" onclick="disconnect()" class="red" disabled>Disconnect</button>
                    <span id="frameCounter" style="margin-left: 10px; font-size: 12px; color: #888; display: none;">Received Frames: 0</span>
                </div>
            </div>
        </div>

        <div class="card col">
            <h2>📩 Commands</h2>
            <label>Presets:</label>
            <div style="margin-bottom: 10px;">
                <button onclick="setPayload('ping')">Ping</button>
                <button onclick="setPayload('auth')">Auth</button>
                <button onclick="setPayload('notification')">Notification</button>
            </div>

            <label for="payloadInput">JSON Payload:</label>
            <textarea id="payloadInput" rows="3">{"type": "ping"}</textarea>
            
            <button onclick="sendData()" id="sendBtn" style="width: 100%;" disabled>Send Command</button>
        </div>
    </div>

    <div class="card">
        <h2>📜 Logs</h2>
        <div id="log"></div>
        <button onclick="document.getElementById('log').innerHTML = ''" style="margin-top: 10px; background: #666; font-size: 12px; padding: 5px 10px;">Clear Logs</button>
    </div>

    <script>
        let ws;
        const logDiv = document.getElementById('log');
        const statusBadge = document.getElementById('statusBadge');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const sendBtn = document.getElementById('sendBtn');
        const urlInput = document.getElementById('urlInput');

        let frameCount = 0;
        const frameCounter = document.getElementById('frameCounter');
        let lastHeartbeatJSON = "";

        function connect() {
            const url = urlInput.value.trim();
            if (!url) return alert("Please enter WebSocket URL");
            
            frameCount = 0;
            updateFrameCounter(true);
            lastHeartbeatJSON = ""; 
            log("Attempting to connect to " + url + "...");
            
            try {
                ws = new WebSocket(url);

                ws.onopen = () => {
                    // Check if really open
                    if (ws.readyState === WebSocket.OPEN) {
                        updateStatus(true);
                        log("✅ Connected! (Socket OPEN)", "success");
                        
                        // Auto-auth if passkey is present
                        const passkey = document.getElementById('passkeyInput').value;
                        if(passkey) {
                            const authPacket = { type: "auth", key: passkey };
                            ws.send(JSON.stringify(authPacket));
                            log("📤 Sent Auto-Auth: " + JSON.stringify(authPacket), "tx");
                        }
                    } else {
                        log("⚠️ Connection opened but state is " + getReadyStateName(ws.readyState));
                    }
                };

                ws.onmessage = (event) => {
                    if (event.data instanceof Blob) {
                        // Handle Binary Data (Image)
                        // For now, update the image count badge, but don't log every single frame
                        updateFrameCounter();
                    } else {
                        // Handle Text Data (JSON)
                        try {
                            const jsonData = JSON.parse(event.data);
                            if (jsonData.type === "heartbeat") {
                                updateMonitor(jsonData);
                                
                                // Heartbeat Change Log logic
                                const cleanData = {
                                    f: jsonData.foreground_service,
                                    s: jsonData.screen_capture_active,
                                    b: jsonData.is_background
                                };
                                const currentHeartbeatStr = JSON.stringify(cleanData);
                                if (currentHeartbeatStr !== lastHeartbeatJSON) {
                                    log("💓 State: " + JSON.stringify(cleanData), "warning");
                                    lastHeartbeatJSON = currentHeartbeatStr;
                                }
                            } else if (jsonData.type === "ocr_result") {
                                // Extract Summary
                                const summary = jsonData.summary || {};
                                log(`🎯 OCR Result [${summary.total_latency_ms}ms]: Found ${summary.text_object_count} objects (Conf: ${(summary.average_confidence*100).toFixed(1)}%)`, "success");
                                const engineData = jsonData.engine_info ? `\n⚙️ Engine: ${JSON.stringify(jsonData.engine_info)}` : '';
                                log(`📥 Payload:${engineData}\n` + JSON.stringify(jsonData, null, 2), "rx");
                            } else {
                                log("📥 Received: " + event.data, "rx");
                            }
                        } catch (e) {
                             log("📥 Received: " + event.data, "rx");
                        }
                    }
                };

                ws.onclose = (event) => {
                    updateStatus(false);
                    clearMonitor();
                    log("❌ Disconnected (Code: " + event.code + ")");
                };

                ws.onerror = (error) => {
                    log("⚠️ Error: Check console for details");
                    console.error("WebSocket Error:", error);
                };
            } catch (e) {
                log("❌ Connection failed: " + e.message);
            }
        }

        function updateMonitor(data) {
            // Support both nested 'data' and flat structure
            const src = data.data || data;
            
            const cpuEl = document.getElementById('cpuVal');
            const ramUsedEl = document.getElementById('ramUsedVal');
            const ramTotalEl = document.getElementById('ramTotalVal');
            const batteryEl = document.getElementById('batteryVal');

            if (src.cpu_usage) {
                cpuEl.textContent = src.cpu_usage;
                const cpuNum = parseFloat(src.cpu_usage);
                cpuEl.className = 'monitor-value ' + (cpuNum > 80 ? 'monitor-high' : cpuNum > 50 ? 'monitor-med' : '');
            }
            
            if (src.ram_used_mb) {
                ramUsedEl.textContent = src.ram_used_mb + " MB";
                const ramPct = (src.ram_used_mb / src.ram_total_mb) * 100;
                ramUsedEl.className = 'monitor-value ' + (ramPct > 90 ? 'monitor-high' : ramPct > 70 ? 'monitor-med' : '');
            }
            
            if (src.ram_total_mb) ramTotalEl.textContent = src.ram_total_mb + " MB";
            
            if (src.ocr_mode) {
                document.getElementById('ocrModeVal').textContent = src.ocr_mode;
            }

            if (src.battery_level !== undefined) {
                batteryEl.textContent = src.battery_level + "% / " + (src.battery_temp || "--") + "°C";
                batteryEl.className = 'monitor-value ' + (src.battery_temp > 42 ? 'monitor-high' : src.battery_temp > 38 ? 'monitor-med' : '');
            }
        }

        function clearMonitor() {
            document.getElementById('cpuVal').textContent = "--%";
            document.getElementById('ramUsedVal').textContent = "-- MB";
            document.getElementById('ramTotalVal').textContent = "-- MB";
            document.getElementById('batteryVal').textContent = "--% / --°C";
        }

        function disconnect() {
            if (ws) ws.close();
        }

        function sendData() {
            if (ws) {
                if (ws.readyState === WebSocket.OPEN) {
                    const data = document.getElementById('payloadInput').value;
                    try {
                        JSON.parse(data); 
                        ws.send(data);
                        log("📤 Sent: " + data, "tx");
                    } catch (e) {
                        log("⚠️ Invalid JSON format, sending anyway...");
                        ws.send(data);
                    }
                } else {
                     log("⚠️ Socket State is " + getReadyStateName(ws.readyState) + " (Not Open)");
                }
            } else {
                log("⚠️ WebSocket object is null");
            }
        }

        function getReadyStateName(state) {
            switch (state) {
                case WebSocket.CONNECTING: return "CONNECTING";
                case WebSocket.OPEN: return "OPEN";
                case WebSocket.CLOSING: return "CLOSING";
                case WebSocket.CLOSED: return "CLOSED";
                default: return "UNKNOWN";
            }
        }

        function updateStatus(isConnected) {
            const frameCounterSpan = document.getElementById('frameCounter');
            if (isConnected) {
                statusBadge.textContent = "Connected";
                statusBadge.className = "status connected";
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                sendBtn.disabled = false;
                urlInput.disabled = true;
                frameCounterSpan.style.display = 'inline-block';
            } else {
                statusBadge.textContent = "Disconnected";
                statusBadge.className = "status disconnected";
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                sendBtn.disabled = true;
                urlInput.disabled = false;
                frameCounterSpan.style.display = 'none';
            }
        }

        function log(msg, type = "info") {
            const now = new Date();
            const time = now.toLocaleTimeString() + "." + String(now.getMilliseconds()).padStart(3, '0');
            
            let color = "#d4d4d4"; // Default info
            if (type === "success") color = "#4ec9b0";
            if (type === "warning") color = "#ce9178";
            if (type === "error") color = "#f44747";
            if (type === "tx") color = "#569cd6";
            if (type === "rx") color = "#dcdcaa";

            const item = document.createElement("div");
            item.className = "log-entry";
            item.innerHTML = `<span style="color:#666; font-size:11px; margin-right:8px;">[${time}]</span><span style="color:${color}">${msg}</span>`;
            
            logDiv.appendChild(item);
            // Auto-scroll
            if(logDiv.scrollTop + logDiv.clientHeight >= logDiv.scrollHeight - 50) {
                 logDiv.scrollTop = logDiv.scrollHeight;
            }
        }

        function setPayload(type) {
            const output = document.getElementById('payloadInput');
            if (type === 'ping') {
                output.value = JSON.stringify({ type: "ping", timestamp: Date.now() }, null, 2);
            } else if (type === 'notification') {
                output.value = JSON.stringify({ 
                    type: "notification", 
                    title: "Hello from Web!", 
                    message: "This confirms background connection working." 
                }, null, 2);
            } else if (type === 'auth') {
                const pass = document.getElementById('passkeyInput').value || "123456";
                output.value = JSON.stringify({ type: "auth", key: pass }, null, 2);
            }
        }

        function setOCRMode(cores, useGpu) {
            const output = document.getElementById('payloadInput');
            const data = {
                type: "config_ocr",
                cores: cores,
                use_gpu: useGpu,
                info: useGpu ? "Switching to GPU Mode" : `Switching to CPU ${cores} Cores`
            };
            output.value = JSON.stringify(data, null, 2);
            log(`Config preset updated: ${data.info}`, "success");
        }

        function updateFrameCounter(start = false) {
            if(start) {
                frameCounter.style.display = 'inline-block';
                frameCounter.innerText = "Frames: 0";
            } else {
                frameCount++;
                frameCounter.innerText = "Frames: " + frameCount;
            }
        }
    </script>
</body>
</html>
